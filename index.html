<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Revelarte Live Studio — Sesión de Arteterapia</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            font-family: 'Inter', sans-serif;
            color: #f0ece4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        /* HEADER */
        .header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding-bottom: 24px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: #f0ece4;
            letter-spacing: 2px;
        }

        .header h1 span {
            color: #d4af37;
        }

        .header p {
            font-size: 0.9rem;
            color: #b0b0b0;
            letter-spacing: 3px;
            font-weight: 300;
            margin-top: 6px;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 18px;
            border: 1px solid #d4af37;
            border-radius: 30px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            margin-top: 12px;
            color: #d4af37;
            background: rgba(212, 175, 55, 0.05);
        }

        /* VIDEO GRID */
        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        .video-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16/9;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }

        .video-card video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #111;
            transform: scaleX(-1); /* Efecto espejo para la cámara local */
        }

        .video-card.remote video {
            transform: scaleX(1);
        }

        .video-label {
            position: absolute;
            bottom: 14px;
            left: 16px;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 1px;
            color: rgba(240, 236, 228, 0.7);
            background: rgba(0, 0, 0, 0.5);
            padding: 4px 14px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(212, 175, 55, 0.15);
        }

        .video-label span {
            color: #d4af37;
        }

        /* CONTROLS */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 16px;
            padding: 24px 20px;
            margin-bottom: 24px;
        }

        .controls-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .controls-group-label {
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #888;
            margin-right: 8px;
            font-weight: 300;
        }

        .btn {
            padding: 10px 22px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            background: transparent;
            color: #f0ece4;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
            min-width: 80px;
        }

        .btn:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: #d4af37;
            transform: translateY(-1px);
        }

        .btn.active {
            background: #d4af37;
            color: #1a1a1a;
            border-color: #d4af37;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.2);
        }

        .btn.danger {
            border-color: #e74c3c;
            color: #e74c3c;
        }

        .btn.danger:hover {
            background: rgba(231, 76, 60, 0.1);
            border-color: #e74c3c;
        }

        .btn.danger.active {
            background: #e74c3c;
            color: #fff;
            border-color: #e74c3c;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* CONNECTION INFO */
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.08);
            font-size: 0.75rem;
            color: #999;
        }

        .info-bar .id {
            font-family: 'Inter', monospace;
            color: #d4af37;
            font-size: 0.7rem;
            word-break: break-all;
        }

        .info-bar .connection {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot.online {
            background: #2ecc71;
            box-shadow: 0 0 8px rgba(46, 204, 113, 0.4);
        }

        .dot.offline {
            background: #e74c3c;
            box-shadow: 0 0 8px rgba(231, 76, 60, 0.4);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .video-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .video-card {
                aspect-ratio: 4/3;
            }
            .header h1 {
                font-size: 1.6rem;
            }
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            .controls-group {
                justify-content: center;
            }
            .btn {
                flex: 1;
                min-width: 60px;
            }
            .info-bar {
                flex-direction: column;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }
            .header h1 {
                font-size: 1.3rem;
            }
            .btn {
                padding: 8px 14px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1>Revelarte <span>Live Studio</span></h1>
            <p>Sesión Privada de Arteterapia</p>
            <div class="status-badge" id="statusBadge">⏳ Conectando...</div>
        </div>

        <!-- VIDEO GRID -->
        <div class="video-grid">
            <div class="video-card">
                <video id="localVideo" autoplay muted playsinline></video>
                <div class="video-label">🎭 <span>Terapeuta</span> (tú)</div>
            </div>
            <div class="video-card remote">
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="video-label">🧘 <span>Paciente</span> (remoto)</div>
            </div>
        </div>

        <!-- CONTROLS -->
        <div class="controls">
            <!-- Controles del terapeuta (administrador) -->
            <div class="controls-group">
                <span class="controls-group-label">🔑 Administrador</span>
                <button class="btn active" id="toggleLocalVideo">📹 Video</button>
                <button class="btn active" id="toggleLocalAudio">🎤 Audio</button>
            </div>

            <div style="width:1px; height:30px; background: rgba(212,175,55,0.15);"></div>

            <!-- Control remoto sobre el paciente -->
            <div class="controls-group">
                <span class="controls-group-label">🎛️ Control remoto</span>
                <button class="btn active" id="toggleRemoteVideo">📹 Video remoto</button>
                <button class="btn active" id="toggleRemoteAudio">🎤 Audio remoto</button>
            </div>

            <div style="width:1px; height:30px; background: rgba(212,175,55,0.15);"></div>

            <!-- Botón de colgar -->
            <div class="controls-group">
                <button class="btn danger" id="endCall">📞 Terminar sesión</button>
            </div>
        </div>

        <!-- INFO BAR -->
        <div class="info-bar">
            <div>
                <span>🆔 Mi ID: </span>
                <span class="id" id="myPeerId">Cargando...</span>
            </div>
            <div class="connection">
                <span>Conexión:</span>
                <span class="dot offline" id="connectionDot"></span>
                <span id="connectionStatus">Desconectado</span>
            </div>
            <div>
                <span>📡 </span>
                <span id="remotePeerIdLabel">Esperando paciente...</span>
            </div>
        </div>
    </div>

    <!-- Cargar PeerJS desde CDN -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <!-- Cargar nuestra lógica -->
    <script src="app.js"></script>
</body>
</html>
