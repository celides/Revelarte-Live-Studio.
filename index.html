<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Revelarte Live Studio</title>
    <!-- Incluimos PeerJS para la conexión de video -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #1a1a1a; color: #d4af37; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .video-container { display: flex; gap: 20px; margin-top: 20px; }
        video { width: 400px; border: 2px solid #d4af37; background: black; }
    </style>
</head>
<body>
    <h1>Revelarte Live Studio</h1>
    <div class="video-container">
        <!-- Espacios para los videos -->
        <video id="localVideo" autoplay muted playsinline></video>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>
    <script src="app.js"></script>
</body>
</html>
